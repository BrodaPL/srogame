<section class="planet-data">
  <div class="planet-data__left">
    <p class="planet-data__owner">{{ ownerLabel() }}</p>
    <h2 class="planet-data__name">{{ planetNameLabel() }}</h2>
    @if (planetImagePath) {
      <img
        class="planet-data__image"
        [src]="planetImagePath"
        [alt]="planetNameLabel() + ' image'"
        [style.transform]="planetImageTransform()"
        [style.filter]="planetImageFilter()"
      />
    }
    <p class="planet-data__meta">{{ planetSizeLabel() }} | {{ planetTypeLabel() }}</p>
  </div>

  <div class="planet-data__right">
    <span class="planet-data__tag" [appTooltip]="planetaryParametersTooltip()">Planetary Parameters</span>
    <span class="planet-data__tag" [appTooltip]="resourcesTooltip()">Resources</span>
    <span class="planet-data__tag" [appTooltip]="buildingsTooltip()">Buildings</span>
    <span class="planet-data__tag" [appTooltip]="technologiesTooltip()">Technology</span>
    <span class="planet-data__tag" [appTooltip]="defencesTooltip()">Defences</span>
    <span class="planet-data__tag" [appTooltip]="shipsTooltip()">Ships</span>
    <span class="planet-data__tag" [appTooltip]="queuesTooltip()">Queues</span>
  </div>
</section>
