<nav class="top-menu">
  <button class="top-menu__button top-menu__button--back" type="button" (click)="goBack()">
    Go back
  </button>
  @if (hasCurrentTutorial()) {
    <button class="top-menu__button top-menu__button--help" type="button" (click)="openCurrentTutorial()">
      ?
    </button>
  }
  <a class="top-menu__button" routerLink="/game/galactic" routerLinkActive="top-menu__button--active">
    Galactic
  </a>
  <a class="top-menu__button" routerLink="/game/imperium" routerLinkActive="top-menu__button--active">
    Imperium
  </a>
  <a class="top-menu__button" routerLink="/game/reports" routerLinkActive="top-menu__button--active">
    Reports
  </a>
  <a class="top-menu__button" routerLink="/game/researches" routerLinkActive="top-menu__button--active">
    Researches
  </a>
  <a class="top-menu__button" routerLink="/game/production" routerLinkActive="top-menu__button--active">
    Production
  </a>
  <a class="top-menu__button" routerLink="/game/buildings" routerLinkActive="top-menu__button--active">
    Buildings
  </a>
  <a class="top-menu__button" routerLink="/game/operations" routerLinkActive="top-menu__button--active">
    Operations
  </a>
  <a class="top-menu__button" routerLink="/game/mission-planner" routerLinkActive="top-menu__button--active">
    Mission Planner
  </a>
  <span class="top-menu__spacer" aria-hidden="true"></span>
  <span class="top-menu__turn">{{ currentTurnLabel() }}</span>
  <button
    class="top-menu__button top-menu__button--end-turn"
    type="button"
    [disabled]="isProcessingTurn()"
    (click)="endTurn()">
    End Turn
  </button>
</nav>
@if (endTurnError) {
  <p class="top-menu__error">{{ endTurnError }}</p>
}

<app-tutorial-overlay></app-tutorial-overlay>
