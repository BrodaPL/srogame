<article
  class="mini-planet-preview"
  [class.mini-planet-preview--no-data]="isNoDataPlanet()"
  [class.mini-planet-preview--player]="isPlayerOwnedPlanet()"
  [class.mini-planet-preview--neutral]="isNeutralOwnedPlanet()"
  [class.mini-planet-preview--human]="isHumanOwnedPlanet()"
  [class.mini-planet-preview--bot]="isBotOwnedPlanet()"
  [class.mini-planet-preview--selected]="isSelected"
>
  <h4 class="mini-planet-preview__name">{{ planetNameLabel() }}</h4>

  <div class="mini-planet-preview__media">
    @if (planetImagePath(); as imagePath) {
      <img class="mini-planet-preview__image" [src]="imagePath" [alt]="planetNameLabel() + ' image'" />
    }
    <p class="mini-planet-preview__owner">{{ ownershipLabel() }}</p>
  </div>

  <div class="mini-planet-preview__tags">
    @for (tag of tags; track tag.label) {
      <span class="mini-planet-preview__tag" [attr.title]="tag.tooltip">
        {{ tag.label }}
      </span>
    }
  </div>

  @if (showSelectionActions) {
    <div class="mini-planet-preview__actions">
      <button
        type="button"
        class="mini-planet-preview__button"
        (click)="emitChooseAsOrigin()"
      >
        Set origin
      </button>
      <button
        type="button"
        class="mini-planet-preview__button"
        (click)="emitChooseAsTarget()"
      >
        Set target
      </button>
      <button
        type="button"
        class="mini-planet-preview__button"
        [attr.title]="'Copy: ' + coordinatesLabel()"
        (click)="copyCoordinates()"
      >
        Copy coordinates
      </button>
    </div>
  } @else if (showDefaultActions) {
    <div class="mini-planet-preview__actions">
      <button
        type="button"
        class="mini-planet-preview__button mini-planet-preview__button--intel"
        [disabled]="!canViewPlanet()"
        [attr.title]="canViewPlanet() ? 'Open planet intel view' : 'Planet intel is unavailable'"
        (click)="openPlanetView()"
      >
        View Planet
      </button>
      <button
        type="button"
        class="mini-planet-preview__button mini-planet-preview__button--mission"
        [disabled]="!canUseAsMissionOrigin()"
        [attr.title]="canUseAsMissionOrigin() ? 'Open Mission Planner with origin ' + coordinatesLabel() : 'Only owned planets can be used as mission origin here'"
        (click)="openMissionPlannerAsOrigin()"
      >
        Mission: origin
      </button>
      <button
        type="button"
        class="mini-planet-preview__button mini-planet-preview__button--mission"
        [attr.title]="'Open Mission Planner with target ' + coordinatesLabel()"
        (click)="openMissionPlannerAsTarget()"
      >
        Mission: target
      </button>
      @if (showSpyAction()) {
        <button
          type="button"
          class="mini-planet-preview__button mini-planet-preview__button--spy"
          [attr.title]="'Launch espionage probes at ' + coordinatesLabel()"
          (click)="openSpyDialog()"
        >
          Spy
        </button>
      }
      <button
        type="button"
        class="mini-planet-preview__button mini-planet-preview__button--utility"
        [attr.title]="'Copy: ' + coordinatesLabel()"
        (click)="copyCoordinates()"
      >
        Copy coordinates
      </button>
    </div>
    @if (spyLaunchNotice) {
      <p class="mini-planet-preview__notice">{{ spyLaunchNotice }}</p>
    }
  }
</article>

<app-spy-launch-dialog
  [isOpen]="isSpyDialogOpen"
  [targetPlanet]="planet"
  (closed)="closeSpyDialog()"
  (launched)="handleSpyMissionLaunched($event)"
></app-spy-launch-dialog>
